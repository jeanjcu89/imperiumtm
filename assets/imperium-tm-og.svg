<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <mask id="chk">
      <rect width="100" height="100" fill="#fff"></rect>
      <path d="M38,58 L47,67 L64,48" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
    </mask>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#d96b2b"></rect>

  <!-- card shadow + card -->
  <rect x="86" y="86" width="1060" height="490" rx="28" fill="#2a211b"></rect>
  <rect x="70" y="70" width="1060" height="490" rx="28" fill="#faf7f2"></rect>

  <!-- badge -->
  <rect x="115" y="112" width="330" height="42" rx="21" fill="#2a211b"></rect>
  <text x="280" y="140" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="17" letter-spacing="1.5" fill="#ffffff">PHOTO-VERIFIED FIELD WORK</text>

  <!-- mark + title -->
  <g transform="translate(112,172) scale(0.92)">
    <rect x="36" y="16" width="7" height="14" rx="3.5" fill="#d96b2b"></rect>
    <rect x="46.5" y="8" width="7" height="22" rx="3.5" fill="#d96b2b"></rect>
    <rect x="57" y="16" width="7" height="14" rx="3.5" fill="#d96b2b"></rect>
    <path d="M50,34 L78,44 L78,62 Q78,80 50,90 Q22,80 22,62 L22,44 Z" fill="#3a2c20" mask="url(#chk)"></path>
  </g>
  <text x="218" y="248" font-family="Arial" font-weight="bold" font-size="70" fill="#2a211b">Imperium</text>

  <!-- description -->
  <text font-family="Arial" font-size="23" fill="#6b5b4d">
    <tspan x="115" y="318">Crew &amp; task management for teams in</tspan>
    <tspan x="115" y="352">the field — schedule jobs, capture</tspan>
    <tspan x="115" y="386">timestamped photo proof of completed</tspan>
    <tspan x="115" y="420">work, track hours, and handle issues</tspan>
    <tspan x="115" y="454">as they happen.</tspan>
  </text>

  <!-- domain -->
  <text x="115" y="528" font-family="Arial" font-weight="bold" font-size="27" fill="#b85618">imperiumtm.com</text>

  <!-- proof panel -->
  <rect x="640" y="115" width="450" height="410" rx="20" fill="#ffffff" stroke="#e8dfd2" stroke-width="2"></rect>
  <text x="668" y="157" font-family="Arial" font-weight="bold" font-size="15" letter-spacing="2" fill="#a1927f">TODAY'S PROOF</text>

  <!-- row 1 -->
  <rect x="664" y="177" width="402" height="64" rx="12" fill="#faf7f2" stroke="#eee5d8"></rect>
  <rect x="680" y="194" width="30" height="30" rx="8" fill="#d96b2b"></rect>
  <text x="695" y="216" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ffffff">✓</text>
  <text x="726" y="217" font-family="Arial" font-weight="bold" font-size="20" fill="#2a211b">Walkthrough completed</text>
  <text x="1048" y="216" text-anchor="end" font-family="Arial" font-weight="bold" font-size="17" fill="#b85618">2:41 PM</text>

  <!-- row 2 -->
  <rect x="664" y="255" width="402" height="64" rx="12" fill="#faf7f2" stroke="#eee5d8"></rect>
  <rect x="680" y="272" width="30" height="30" rx="8" fill="#d96b2b"></rect>
  <text x="695" y="294" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ffffff">✓</text>
  <text x="726" y="295" font-family="Arial" font-weight="bold" font-size="20" fill="#2a211b">Equipment inspected</text>
  <text x="1048" y="294" text-anchor="end" font-family="Arial" font-weight="bold" font-size="17" fill="#b85618">3:05 PM</text>

  <!-- row 3 -->
  <rect x="664" y="333" width="402" height="64" rx="12" fill="#faf7f2" stroke="#eee5d8"></rect>
  <rect x="680" y="350" width="30" height="30" rx="8" fill="#d96b2b"></rect>
  <text x="695" y="372" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ffffff">✓</text>
  <text x="726" y="373" font-family="Arial" font-weight="bold" font-size="20" fill="#2a211b">Site secured &amp; locked</text>
  <text x="1048" y="372" text-anchor="end" font-family="Arial" font-weight="bold" font-size="17" fill="#b85618">3:22 PM</text>

  <!-- approved pill -->
  <rect x="664" y="425" width="170" height="42" rx="21" fill="#e2efe5"></rect>
  <text x="749" y="452" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="17" fill="#4f8a5b">✓ APPROVED</text>
</svg>
